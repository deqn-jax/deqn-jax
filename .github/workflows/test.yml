name: tests

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (CPU-only JAX)
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/ -q

      - name: CLI smoke — check
        run: uv run deqn-jax check

      - name: CLI smoke — list & optimizers
        run: |
          uv run deqn-jax list
          uv run deqn-jax optimizers

      - name: CLI smoke — 20-episode training
        run: uv run deqn-jax train brock_mirman -n 20 -q

      - name: CLI smoke — evaluate (short)
        run: |
          CKPT=$(find checkpoints -name 'checkpoint_*.eqx' | head -1)
          if [ -z "$CKPT" ]; then
            echo "No checkpoint from smoke train — skipping evaluate"
          else
            uv run deqn-jax evaluate "$CKPT" -n 100
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Verify artifacts exist
        run: |
          ls -lh dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
