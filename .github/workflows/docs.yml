name: docs

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync docs dependencies
        run: uv sync --extra docs

      # Non-strict for now: the Gallery's executed .ipynb leaves are heat-gated
      # (re-execution pending), so they 404 under --strict. Flip to
      # `mkdocs build --strict` once the gallery notebooks land in docs/site/gallery/.
      - name: Build the documentation site
        run: uv run mkdocs build
