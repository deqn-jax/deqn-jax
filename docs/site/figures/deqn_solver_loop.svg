<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 940"
     width="100%"
     role="img"
     aria-labelledby="svg-title svg-desc">
  <title id="svg-title">DEQN-JAX training cycle (high-level)</title>
  <desc id="svg-desc">
    Training cycle for DEQN-JAX. A one-time eager setup chain produces a
    TrainState. The Python episode loop calls cycle_step (the single JIT
    boundary), which runs one rollout to fill a trajectory, then sweeps
    minibatches through grad_step, returning an updated TrainState.
  </desc>

  <!--
    ============================================================
    PALETTE & TYPOGRAPHY
    Edit the CSS variables in :root to reskin the whole diagram.
    ============================================================
  -->
  <style><![CDATA[
    :root {
      /* surface */
      --bg:           #fafafa;

      /* nodes */
      --node-fill:    #ffffff;
      --node-stroke:  #303030;
      --node-stroke-w: 1.2;

      /* text */
      --text:         #1f1f1f;
      --text-muted:   #707070;
      --text-pathref: #4527a0;   /* file:function annotations */

      /* arrows */
      --arrow:        #404040;
      --arrow-w:      1.4;

      /* python outer loop */
      --pyloop-fill:    #f4f7fb;
      --pyloop-stroke:  #4a6890;
      --pyloop-stroke-w: 1.2;

      /* JIT boundary — accent colour the eye should lock onto */
      --jit-fill:     #fff7e0;
      --jit-stroke:   #c5421a;
      --jit-stroke-w: 2;
      --jit-dash:     6 4;

      /* TrainState (pytree threading through the loop) */
      --state-fill:   #ede7f6;
      --state-stroke: #5e35b1;

      /* fonts */
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }

    .bg            { fill: var(--bg); }
    .node          { fill: var(--node-fill); stroke: var(--node-stroke);
                     stroke-width: var(--node-stroke-w); }
    .node-label    { font-family: var(--font-mono); font-size: 13px;
                     font-weight: 600; fill: var(--text); text-anchor: middle; }
    .node-sub      { font-family: var(--font-mono); font-size: 11px;
                     fill: var(--text-muted); text-anchor: middle; }
    .node-pathref  { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-pathref); text-anchor: middle; }

    .arrow         { fill: none; stroke: var(--arrow);
                     stroke-width: var(--arrow-w); }
    .arrow-head    { fill: var(--arrow); }

    .pyloop-box    { fill: var(--pyloop-fill); stroke: var(--pyloop-stroke);
                     stroke-width: var(--pyloop-stroke-w); }
    .pyloop-label  { font-family: var(--font-mono); font-size: 12px;
                     font-weight: 700; fill: var(--pyloop-stroke); }

    .jit-box       { fill: var(--jit-fill); stroke: var(--jit-stroke);
                     stroke-width: var(--jit-stroke-w);
                     stroke-dasharray: var(--jit-dash); }
    .jit-label     { font-family: var(--font-mono); font-size: 11px;
                     font-weight: 700; fill: var(--jit-stroke); }

    .state-box     { fill: var(--state-fill); stroke: var(--state-stroke);
                     stroke-width: 1.2; }
    .state-label   { font-family: var(--font-mono); font-size: 11px;
                     font-weight: 700; fill: var(--state-stroke);
                     text-anchor: middle; }

    .title-text    { font-family: var(--font-mono); font-size: 18px;
                     font-weight: 700; fill: var(--text); text-anchor: middle; }
    .subtitle-text { font-family: var(--font-mono); font-size: 11px;
                     fill: var(--text-muted); text-anchor: middle; }
    .legend-text   { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-muted); }
    .wire-label    { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-muted); text-anchor: middle;
                     font-style: italic; }
  ]]></style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="800" height="940"/>

  <!-- ===== title ===== -->
  <text class="title-text"    x="400" y="36">DEQN-JAX training cycle</text>
  <text class="subtitle-text" x="400" y="55">high-level · detailed companion: deqn_solver_loop_detailed.svg</text>

  <!--
    ============================================================
    SETUP CHAIN (one-time, eager, top of diagram)
    ============================================================
  -->

  <!-- 1. TrainConfig -->
  <rect class="node" x="60"  y="92" width="180" height="56" rx="6" ry="6"/>
  <text class="node-label"   x="150" y="116">TrainConfig</text>
  <text class="node-pathref" x="150" y="134">config.py</text>

  <!-- arrow -->
  <path class="arrow" d="M 245 120 L 295 120" marker-end="url(#arrow)"/>

  <!-- 2. load_model + create_train_state -->
  <rect class="node" x="300" y="80" width="200" height="80" rx="6" ry="6"/>
  <text class="node-label"   x="400" y="102">load_model →</text>
  <text class="node-label"   x="400" y="120">create_train_state</text>
  <text class="node-pathref" x="400" y="138">models/__init__.py</text>
  <text class="node-pathref" x="400" y="152">training/trainer.py</text>

  <!-- arrow -->
  <path class="arrow" d="M 505 120 L 555 120" marker-end="url(#arrow)"/>

  <!-- 3. make_train_step (build cycle_step + jit) -->
  <rect class="node" x="560" y="80" width="180" height="80" rx="6" ry="6"/>
  <text class="node-label"   x="650" y="102">make_train_step</text>
  <text class="node-sub"     x="650" y="120">→ jit(cycle_step)</text>
  <text class="node-pathref" x="650" y="138">training/trainer.py</text>
  <text class="node-pathref" x="650" y="152">+ training/cycle.py</text>

  <!-- TrainState pytree handoff -->
  <path class="arrow" d="M 400 165 L 400 195" marker-end="url(#arrow)"/>
  <rect class="state-box" x="340" y="195" width="120" height="26" rx="13" ry="13"/>
  <text class="state-label" x="400" y="213">TrainState</text>
  <path class="arrow" d="M 400 225 L 400 256" marker-end="url(#arrow)"/>

  <!--
    ============================================================
    OUTER PYTHON LOOP — for ep in 0..total_episodes
    ============================================================
  -->

  <!-- container -->
  <rect class="pyloop-box" x="50" y="260" width="700" height="615" rx="10" ry="10"/>
  <text class="pyloop-label" x="68" y="284">for ep in 0..total_episodes:</text>
  <text class="legend-text"  x="68" y="300">training/trainer.py — Python-side dispatch, logging, checkpointing</text>

  <!-- shock_scale from curriculum -->
  <rect class="node" x="80"  y="318" width="220" height="40" rx="6" ry="6"/>
  <text class="node-label"   x="190" y="338">shock_scale = curriculum(ep)</text>
  <text class="node-pathref" x="190" y="352">training/trainer.py</text>

  <!-- side wire from shock_scale into JIT box -->
  <path class="arrow" d="M 305 338 C 360 338, 360 392, 415 392" marker-end="url(#arrow)"/>
  <text class="wire-label" x="370" y="370">shock_scale</text>

  <!--
    ============================================================
    JIT BOUNDARY — cycle_step
    ============================================================
  -->

  <!-- jit box -->
  <rect class="jit-box" x="80" y="378" width="640" height="408" rx="10" ry="10"/>

  <!-- jit corner badge -->
  <rect x="80" y="378" width="160" height="22" rx="0" ry="0"
        fill="var(--jit-stroke)" opacity="0.92"/>
  <text x="92" y="394" class="jit-label" fill="#ffffff">@jax.jit cycle_step</text>
  <text class="node-pathref" x="709" y="394" text-anchor="end" fill="var(--jit-stroke)">training/cycle.py</text>

  <!-- 1. rollout_fn -->
  <rect class="node" x="120" y="426" width="240" height="80" rx="6" ry="6"/>
  <text class="node-label"   x="240" y="448">rollout_fn</text>
  <text class="node-sub"     x="240" y="466">lax.scan over episode_length:</text>
  <text class="node-sub"     x="240" y="481">policy → step → next_state</text>
  <text class="node-pathref" x="240" y="498">training/{cycle, episode}.py</text>

  <!-- arrow rollout → trajectory -->
  <path class="arrow" d="M 365 466 L 425 466" marker-end="url(#arrow)"/>
  <text class="wire-label" x="395" y="458">trajectory</text>

  <!-- trajectory pytree -->
  <rect class="state-box" x="430" y="446" width="170" height="40" rx="6" ry="6"/>
  <text class="state-label" x="515" y="464">trajectory</text>
  <text class="node-sub"    x="515" y="478">[T, B, n_states]</text>

  <!-- arrow trajectory → minibatch sweep -->
  <path class="arrow" d="M 515 490 L 515 540" marker-end="url(#arrow)"/>

  <!-- 2. minibatch sweep -->
  <rect class="node" x="120" y="540" width="560" height="200" rx="6" ry="6"/>
  <text class="node-label" x="400" y="564">minibatch sweep</text>
  <text class="node-sub"   x="400" y="582">for epoch in n_epochs: for mb in n_minibatches:</text>

  <!-- inner: grad_step -->
  <rect class="node" x="160" y="600" width="220" height="120" rx="6" ry="6"
        fill="var(--bg)"/>
  <text class="node-label"   x="270" y="624">grad_step</text>
  <text class="node-sub"     x="270" y="641">value_and_grad / jacrev /</text>
  <text class="node-sub"     x="270" y="657">lbfgs / GN — variant-specific</text>
  <text class="node-pathref" x="270" y="678">optimizers/&lt;name&gt;.py</text>
  <text class="node-pathref" x="270" y="692">{standard, pcgrad, mao,</text>
  <text class="node-pathref" x="270" y="706">mao_kfac, lbfgs,</text>
  <text class="node-pathref" x="270" y="720">gauss_newton}.py</text>

  <!-- arrow grad_step → compute_loss -->
  <path class="arrow" d="M 385 660 L 425 660" marker-end="url(#arrow)"/>

  <!-- inner: compute_loss -->
  <rect class="node" x="430" y="600" width="210" height="120" rx="6" ry="6"
        fill="var(--bg)"/>
  <text class="node-label"   x="535" y="624">compute_loss</text>
  <text class="node-sub"     x="535" y="641">shocks → vmap(residuals)</text>
  <text class="node-sub"     x="535" y="657">→ aggregate (+ aux if</text>
  <text class="node-sub"     x="535" y="673">composite)</text>
  <text class="node-pathref" x="535" y="694">training/loss.py</text>
  <text class="node-pathref" x="535" y="708">+ composite_loss.py</text>

  <!-- detail-link callout -->
  <text class="wire-label" x="535" y="734">(detailed: see companion SVG)</text>

  <!-- arrow exit JIT -->
  <path class="arrow" d="M 400 786 L 400 810" marker-end="url(#arrow)"/>

  <!-- new TrainState pill on exit -->
  <rect class="state-box" x="320" y="810" width="160" height="26" rx="13" ry="13"/>
  <text class="state-label" x="400" y="828">→ new TrainState</text>

  <!-- log + checkpoint footer -->
  <rect class="node" x="80"  y="846" width="640" height="20" rx="4" ry="4"
        fill="var(--bg)" stroke="var(--text-muted)" stroke-width="0.8"/>
  <text class="node-sub"     x="190" y="861">log metrics</text>
  <text class="node-pathref" x="320" y="861">training/reporting.py</text>
  <text class="node-sub"     x="450" y="861">checkpoint</text>
  <text class="node-pathref" x="600" y="861">training/checkpointing.py</text>

  <!--
    ============================================================
    LEGEND
    ============================================================
  -->
  <g transform="translate(50, 895)">
    <rect class="node" x="0" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="20" y="9">function / module</text>

    <rect class="jit-box" x="160" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="180" y="9">jax.jit boundary</text>

    <rect class="state-box" x="305" y="0" width="14" height="10" rx="5" ry="5"/>
    <text class="legend-text" x="325" y="9">pytree (TrainState / trajectory)</text>

    <rect class="pyloop-box" x="540" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="560" y="9">Python (eager) loop</text>
  </g>
</svg>
