<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 820 1095"
     width="100%"
     role="img"
     aria-labelledby="svg-title svg-desc">
  <title id="svg-title">DEQN-JAX training cycle (high-level)</title>
  <desc id="svg-desc">
    Training cycle for DEQN-JAX. A one-time eager setup chain produces a
    TrainState, then the Python episode loop calls cycle_step (the single
    JIT boundary). Inside cycle_step a SIMULATION phase runs one rollout
    to fill a trajectory, then a TRAINING phase sweeps minibatches through
    grad_step/compute_loss, returning an updated TrainState.
  </desc>

  <!--
    ============================================================
    PALETTE & TYPOGRAPHY
    Edit the CSS variables in :root to reskin the whole diagram.
    ============================================================
  -->
  <style><![CDATA[
    :root {
      /* surface */
      --bg:           #fafafa;

      /* nodes */
      --node-fill:    #ffffff;
      --node-stroke:  #303030;
      --node-stroke-w: 1.2;

      /* text */
      --text:         #1f1f1f;
      --text-muted:   #707070;
      --text-pathref: #4527a0;   /* file:function annotations */

      /* arrows */
      --arrow:        #404040;
      --arrow-w:      1.4;

      /* one-time setup region */
      --setup-fill:    #f1f3f5;
      --setup-stroke:  #8a8f97;
      --setup-stroke-w: 1.2;

      /* python outer loop */
      --pyloop-fill:    #f4f7fb;
      --pyloop-stroke:  #4a6890;
      --pyloop-stroke-w: 1.2;

      /* JIT boundary — accent colour the eye should lock onto */
      --jit-fill:     #fff7e0;
      --jit-stroke:   #c5421a;
      --jit-stroke-w: 2;
      --jit-dash:     6 4;
      --jit-on-accent: #ffffff;  /* text colour on top of jit-stroke */

      /* sim / training subdividers inside JIT */
      --phase-line:   #b89c5e;

      /* TrainState (pytree threading through the loop) */
      --state-fill:   #ede7f6;
      --state-stroke: #5e35b1;

      /* fonts */
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }

    .bg            { fill: var(--bg); }
    .node          { fill: var(--node-fill); stroke: var(--node-stroke);
                     stroke-width: var(--node-stroke-w); }
    .node-label    { font-family: var(--font-mono); font-size: 13px;
                     font-weight: 600; fill: var(--text); text-anchor: middle; }
    .node-sub      { font-family: var(--font-mono); font-size: 11px;
                     fill: var(--text-muted); text-anchor: middle; }
    .node-pathref  { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-pathref); text-anchor: middle; }

    .arrow         { fill: none; stroke: var(--arrow);
                     stroke-width: var(--arrow-w); }
    .arrow-head    { fill: var(--arrow); }

    .setup-box     { fill: var(--setup-fill); stroke: var(--setup-stroke);
                     stroke-width: var(--setup-stroke-w); }
    .setup-label   { font-family: var(--font-mono); font-size: 11px;
                     font-weight: 700; fill: var(--setup-stroke);
                     letter-spacing: 0.5px; }

    .pyloop-box    { fill: var(--pyloop-fill); stroke: var(--pyloop-stroke);
                     stroke-width: var(--pyloop-stroke-w); }
    .pyloop-label  { font-family: var(--font-mono); font-size: 12px;
                     font-weight: 700; fill: var(--pyloop-stroke); }

    .jit-box       { fill: var(--jit-fill); stroke: var(--jit-stroke);
                     stroke-width: var(--jit-stroke-w);
                     stroke-dasharray: var(--jit-dash); }
    .jit-badge     { fill: var(--jit-stroke); }
    .jit-badge-text{ font-family: var(--font-mono); font-size: 11px;
                     font-weight: 700; fill: var(--jit-on-accent); }
    .jit-pathref   { font-family: var(--font-mono); font-size: 10px;
                     font-weight: 600; fill: var(--jit-stroke); }

    .phase-divider { stroke: var(--phase-line); stroke-width: 1;
                     stroke-dasharray: 3 3; }
    .phase-label   { font-family: var(--font-mono); font-size: 10px;
                     font-weight: 700; fill: var(--phase-line);
                     letter-spacing: 1px; }

    .state-box     { fill: var(--state-fill); stroke: var(--state-stroke);
                     stroke-width: 1.2; }
    .state-label   { font-family: var(--font-mono); font-size: 11px;
                     font-weight: 700; fill: var(--state-stroke);
                     text-anchor: middle; }

    .title-text    { font-family: var(--font-mono); font-size: 18px;
                     font-weight: 700; fill: var(--text); text-anchor: middle; }
    .subtitle-text { font-family: var(--font-mono); font-size: 11px;
                     fill: var(--text-muted); text-anchor: middle; }
    .legend-text   { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-muted); }
    .wire-label    { font-family: var(--font-mono); font-size: 10px;
                     fill: var(--text-muted); text-anchor: middle;
                     font-style: italic; }
  ]]></style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="820" height="1095"/>

  <!-- ===== title ===== -->
  <text class="title-text"    x="410" y="34">DEQN-JAX training cycle</text>
  <text class="subtitle-text" x="410" y="52">high-level · detailed companion: deqn_solver_loop_detailed.svg</text>

  <!--
    ============================================================
    REGION A — ONE-TIME SETUP (eager, before any loop)
    Forks after load_model: create_train_state produces TrainState
    (data); make_train_step produces cycle_step (callable). Both
    are inputs into the loop.
    ============================================================
  -->

  <rect class="setup-box" x="40" y="74" width="740" height="262" rx="10" ry="10"/>
  <text class="setup-label" x="56" y="93">ONE-TIME SETUP (eager)</text>

  <!-- top row: TrainConfig → load_model (centred) -->
  <rect class="node" x="220"  y="108" width="150" height="62" rx="6" ry="6"/>
  <text class="node-label"   x="295" y="132">TrainConfig</text>
  <text class="node-sub"     x="295" y="148">YAML / CLI / overrides</text>
  <text class="node-pathref" x="295" y="164">config.py</text>

  <path class="arrow" d="M 375 139 L 405 139" marker-end="url(#arrow)"/>

  <rect class="node" x="410"  y="108" width="150" height="62" rx="6" ry="6"/>
  <text class="node-label"   x="485" y="132">load_model</text>
  <text class="node-sub"     x="485" y="148">→ ModelSpec</text>
  <text class="node-pathref" x="485" y="164">models/__init__.py</text>

  <!-- handoff: ModelSpec wire ↓ to fork -->
  <path class="arrow" d="M 485 174 L 485 188" marker-end="url(#arrow)"/>
  <text class="wire-label" x="485" y="201">ModelSpec</text>

  <!-- fork: ModelSpec splits to create_train_state (left) and make_train_step (right) -->
  <path class="arrow" d="M 485 206 C 485 218, 220 218, 220 230" marker-end="url(#arrow)"/>
  <path class="arrow" d="M 485 206 C 485 218, 620 218, 620 230" marker-end="url(#arrow)"/>

  <!-- left branch: create_train_state -->
  <rect class="node" x="80"  y="232" width="280" height="78" rx="6" ry="6"/>
  <text class="node-label"   x="220" y="254">create_train_state</text>
  <text class="node-sub"     x="220" y="272">network, optimizer, init states,</text>
  <text class="node-sub"     x="220" y="288">history seed, opt_state init</text>
  <text class="node-pathref" x="220" y="304">training/trainer.py</text>

  <!-- right branch: make_train_step -->
  <rect class="node" x="480" y="232" width="280" height="78" rx="6" ry="6"/>
  <text class="node-label"   x="620" y="254">make_train_step</text>
  <text class="node-sub"     x="620" y="272">dispatch on OptimizerKind,</text>
  <text class="node-sub"     x="620" y="288">compose rollout + grad_step, jit</text>
  <text class="node-pathref" x="620" y="304">training/trainer.py · training/cycle.py</text>

  <!--
    ============================================================
    HANDOFF — two outputs (TrainState data, cycle_step callable)
    converge into the loop entry.
    ============================================================
  -->

  <!-- pills directly below each branch -->
  <path class="arrow" d="M 220 314 L 220 342" marker-end="url(#arrow)"/>
  <rect class="state-box" x="160" y="344" width="120" height="26" rx="13" ry="13"/>
  <text class="state-label" x="220" y="362">TrainState</text>

  <path class="arrow" d="M 620 314 L 620 342" marker-end="url(#arrow)"/>
  <rect class="state-box" x="560" y="344" width="120" height="26" rx="13" ry="13"/>
  <text class="state-label" x="620" y="362">cycle_step</text>

  <!-- merge to loop entry -->
  <path class="arrow" d="M 220 372 C 220 386, 410 386, 410 396" marker-end="url(#arrow)"/>
  <path class="arrow" d="M 620 372 C 620 386, 410 386, 410 396" marker-end="url(#arrow)"/>

  <text class="wire-label" x="320" y="392">data ↓</text>
  <text class="wire-label" x="500" y="392">callable ↓</text>

  <!--
    ============================================================
    REGION B — PYTHON LOOP (per cycle, eager outside JIT)
    ============================================================
  -->

  <rect class="pyloop-box" x="40" y="400" width="740" height="650" rx="10" ry="10"/>
  <text class="pyloop-label" x="56" y="424">for ep in 0..total_episodes:</text>
  <text class="legend-text"  x="56" y="440">training/trainer.py — eager dispatch, logging, checkpointing</text>

  <!-- args row: shock_scale and lr_scale -->
  <rect class="node" x="60" y="454" width="700" height="50" rx="6" ry="6"/>
  <text class="node-label"   x="200" y="476">shock_scale = curriculum(ep)</text>
  <text class="node-label"   x="600" y="476">lr_scale = lr_schedule(ep)</text>
  <text class="node-sub"     x="410" y="494">passed as cycle_step args — feed both SIMULATION and TRAINING phases below</text>

  <path class="arrow" d="M 410 510 L 410 532" marker-end="url(#arrow)"/>

  <!--
    ============================================================
    JIT BOUNDARY — cycle_step (training/cycle.py)
    ============================================================
  -->

  <!-- jit box -->
  <rect class="jit-box" x="60" y="536" width="700" height="468" rx="10" ry="10"/>

  <!-- jit corner badge: rect + text together, both stay readable -->
  <rect class="jit-badge" x="60" y="536" width="200" height="22" rx="0" ry="0"/>
  <text class="jit-badge-text" x="72" y="552">@jax.jit cycle_step</text>
  <text class="jit-pathref"    x="270" y="552">training/cycle.py</text>

  <!-- =========== SIMULATION subregion =========== -->
  <line class="phase-divider" x1="190" y1="578" x2="745" y2="578"/>
  <text class="phase-label"   x="80" y="582">SIMULATION</text>

  <rect class="node" x="100" y="596" width="620" height="78" rx="6" ry="6"/>
  <text class="node-label"   x="410" y="618">rollout_fn  (uses shock_scale)</text>
  <text class="node-sub"     x="410" y="636">lax.scan over episode_length:</text>
  <text class="node-sub"     x="410" y="652">policy(state) → step(state, policy, shock) → next_state</text>
  <text class="node-pathref" x="410" y="668">training/cycle.py · training/episode.py · models/&lt;name&gt;/dynamics.py</text>

  <path class="arrow" d="M 410 680 L 410 700" marker-end="url(#arrow)"/>

  <rect class="state-box" x="265" y="700" width="290" height="34" rx="6" ry="6"/>
  <text class="state-label" x="410" y="716">trajectory</text>
  <text class="node-sub"    x="410" y="730">[T, B, n_states]   (data for training)</text>

  <!-- explicit data-flow: trajectory → minibatch sweep -->
  <path class="arrow" d="M 410 736 L 410 776" marker-end="url(#arrow)"/>
  <text class="wire-label" x="420" y="754" text-anchor="start">shuffle + slice → batch [B, n_states]</text>

  <!-- =========== TRAINING subregion =========== -->
  <line class="phase-divider" x1="170" y1="762" x2="745" y2="762"/>
  <text class="phase-label"   x="80" y="766">TRAINING</text>

  <rect class="node" x="100" y="778" width="620" height="208" rx="6" ry="6"/>
  <text class="node-label" x="410" y="800">minibatch sweep  (uses lr_scale, shock_scale)</text>
  <text class="node-sub"   x="410" y="816">for epoch in n_epochs: for mb in n_minibatches:</text>
  <text class="node-sub"   x="410" y="830">grad_step receives one batch slice per call</text>

  <!-- inner: grad_step -->
  <rect class="node" x="135" y="830" width="245" height="140" rx="6" ry="6"
        fill="var(--bg)"/>
  <text class="node-label"   x="257" y="852">grad_step</text>
  <text class="node-sub"     x="257" y="870">value_and_grad / jacrev /</text>
  <text class="node-sub"     x="257" y="886">lbfgs / GN — variant-specific</text>
  <text class="node-pathref" x="257" y="910">optimizers/&lt;name&gt;.py</text>
  <text class="node-sub"     x="257" y="936">(6 variants — fan-out in</text>
  <text class="node-sub"     x="257" y="952">the detailed companion)</text>

  <!-- bidirectional arrow grad_step ↔ compute_loss -->
  <path class="arrow" d="M 385 900 L 425 900" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- inner: compute_loss -->
  <rect class="node" x="430" y="830" width="260" height="140" rx="6" ry="6"
        fill="var(--bg)"/>
  <text class="node-label"   x="560" y="852">compute_loss</text>
  <text class="node-sub"     x="560" y="870">shocks → vmap(residuals)</text>
  <text class="node-sub"     x="560" y="886">→ aggregate (+ aux if</text>
  <text class="node-sub"     x="560" y="902">composite)</text>
  <text class="node-pathref" x="560" y="926">training/loss.py</text>
  <text class="node-pathref" x="560" y="940">+ training/composite_loss.py</text>
  <text class="node-pathref" x="560" y="954">+ training/shocks.py</text>

  <!--
    ============================================================
    EXIT — back to Python side
    ============================================================
  -->

  <path class="arrow" d="M 410 1004 L 410 1024" marker-end="url(#arrow)"/>

  <!-- new TrainState pill on exit -->
  <rect class="state-box" x="320" y="1024" width="180" height="26" rx="13" ry="13"/>
  <text class="state-label" x="410" y="1042">→ updated TrainState</text>

  <!-- log + checkpoint footer -->
  <text class="node-sub"     x="180" y="1075">log metrics</text>
  <text class="node-pathref" x="320" y="1075">training/reporting.py</text>
  <text class="node-sub"     x="475" y="1075">checkpoint</text>
  <text class="node-pathref" x="630" y="1075">training/checkpointing.py</text>

  <!--
    ============================================================
    LEGEND
    ============================================================
  -->
  <g transform="translate(40, 1085)">
    <rect class="node" x="0" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="20" y="9">function / module</text>

    <rect class="jit-box" x="160" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="180" y="9">jax.jit boundary</text>

    <rect class="state-box" x="305" y="0" width="14" height="10" rx="5" ry="5"/>
    <text class="legend-text" x="325" y="9">pytree (TrainState / trajectory)</text>

    <rect class="setup-box" x="540" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="560" y="9">eager region</text>

    <rect class="pyloop-box" x="660" y="0" width="14" height="10" rx="2" ry="2"/>
    <text class="legend-text" x="680" y="9">Python loop</text>
  </g>
</svg>
