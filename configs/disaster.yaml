# Disaster model (CMR NK-DSGE with financial frictions) — validated v0.1.0 stack.
# LinearPlusMLP architecture + composite loss. Start here for the disaster model.
#
# Set p_disaster > 0 in the model CONSTANTS to enable disaster branch
# (mixture expectation over no-disaster + capital-destruction disaster).
#
# Expected wall-clock (DGX GB10, batch 64, 128x128): ~3k eps / minute post-JIT.
model: disaster
episodes: 3000
batch_size: 64
episode_length: 20
mc_samples: 2
seed: 42
fp64: true
log_every: 100
warm_start: true
curriculum_episodes: 200
curriculum_start: 0.1
ss_reset_frac: 0.15

network:
  type: disaster_policy_net
  hidden_sizes: [128, 128]
  activation: tanh
  init: xavier_normal
  init_scale: 0.0   # 0.0 = exact linear policy at init; delta grows via training

optimizer:
  name: adam
  learning_rate: 1e-4
  lr_schedule: cosine
  lr_warmup: 100
  lr_min_factor: 0.05
  grad_clip: 0.5

shock_mask: [1, 1, 1, 1, 1]
expectation_type: quadrature
n_quadrature_points: 3

loss_type: composite
composite_loss:
  anchor_weight: 1.0      # supervised: match linearized policy at anchor points
  jac_weight: 0.1         # supervised: match dπ/ds(SS) = P
  barrier_weight: 0.01
  newton_weight: 0.01
  n_anchor_points: 128
  anchor_sigma: 1.0
  aux_decay_floor: 1.0    # keep anchor active throughout training

checkpoint_dir: checkpoints/disaster
checkpoint_every: 250
max_checkpoints: 15
tensorboard_dir: runs/disaster
