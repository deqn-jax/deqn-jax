# Brock-Mirman with endogenous labor under an upper labor cap (Geneva 2026 Day 2 Ex 3).
# The labor cap is enforced via a Fischer-Burmeister complementarity in the
# model's equations (see models/bm_labor_constrained/equations.py); with the
# reference's 1.01-output / 1.02-FB-cap split the cap is slack by construction
# and the FB enforces the interior labor FOC.
#
# Recipe note: on-policy trajectory sampling (episode_length=100), which
# concentrates capacity on the ergodic set and converges ~1 decimal deeper
# there than the exogenous-rect phase alone (the reference's scheme is
# two-phase rect -> rollout; this single-phase trajectory recipe is the
# closer ergodic-accuracy match).

model: bm_labor_constrained
episodes: 6000
batch_size: 64
episode_length: 100
mc_samples: 5
seed: 0

network:
  type: mlp
  hidden_sizes: [64, 64]
  activation: tanh

optimizer:
  name: adam
  learning_rate: 1.0e-3
  lr_schedule: cosine
  lr_min_factor: 0.1

log_every: 1000
